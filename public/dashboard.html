        <p><b>Nama:</b> ${me.nama}</p><p><b>Username:</b> ${me.username}</p>
        <p><b>Jabatan:</b> ${me.jabatan}</p><p><b>Shift:</b> ${me.shift} • ${me.shiftStartTime}</p>
      </div>
    </div>
  </div>`;
}
let avatarBase64="";
function previewAvatar(input){const file=input.files[0];if(!file)return;const reader=new FileReader();reader.onload=function(e){avatarBase64=e.target.result;const p=document.getElementById("avatarPreview");if(p)p.innerHTML=`<img src="${avatarBase64}">`;};reader.readAsDataURL(file);}
async function saveMyProfile(){
  const nickname=document.getElementById("pNick").value.trim();const phone=document.getElementById("pPhone").value.trim();const bio=document.getElementById("pBio").value.trim();const motto=document.getElementById("pMotto").value.trim();const avatarText=document.getElementById("pAvatarText").value.trim();const body={nickname,phone,bio,motto,avatarText};if(avatarBase64)body.avatarImage=avatarBase64;
  try{const r=await fetchJson(`/api/staff/${state.currentUser.id}/profile`,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});if(r.status!=="success"){toast(r.message||"Gagal",true);return;}state.currentUser=r.data;saveStoredUser(r.data);avatarBase64="";toast("Profil berhasil diperbarui ✓");await renderAppPage();}catch{toast("Server error",true);}
}
async function changeMyPassword(){
  const oldPw=document.getElementById("cpOld").value.trim();const newPw=document.getElementById("cpNew").value.trim();const confPw=document.getElementById("cpConfirm").value.trim();
  if(!oldPw||!newPw||!confPw){toast("Semua field wajib diisi",true);return;}if(newPw.length<4){toast("Password baru minimal 4 karakter",true);return;}if(newPw!==confPw){toast("Konfirmasi password tidak sama",true);return;}
  try{const r=await fetchJson(`/api/staff/${state.currentUser.id}/change-password`,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify({oldPassword:oldPw,newPassword:newPw})});if(r.status!=="success"){toast(r.message||"Gagal",true);return;}toast("Password berhasil diubah ✓");["cpOld","cpNew","cpConfirm"].forEach(id=>{const el=document.getElementById(id);if(el)el.value="";});}catch{toast("Server error",true);}
}

// ══════════════════════════════════════════════════════
// TIMERS
// ══════════════════════════════════════════════════════
function startLiveClock(){stopLiveClock();const update=()=>{const el=document.getElementById("liveClock");if(el)el.textContent=new Date().toLocaleTimeString("id-ID");};update();state.clockTimer=setInterval(update,1000);}
function stopLiveClock(){if(state.clockTimer){clearInterval(state.clockTimer);state.clockTimer=null;}}
function startIzinStatusTimer(){
  stopIzinStatusTimer();if(!state.currentUser||state.currentUser.role==="admin")return;
  state.izinStatusTimer=setInterval(async()=>{
    const status=await fetchIzinStatus(state.currentUser.id);if(!status||!status.active){state.izinWarn14Shown=false;state.izinOverShown=false;return;}
    if(status.izin.nearLimit&&!state.izinWarn14Shown){state.izinWarn14Shown=true;showCenterAlert({title:"⚠ PERINGATAN WAKTU!",message:"Durasi izin Anda mendekati batas 15 menit.",submessage:`Sisa: ${status.izin.remainingMinutes} menit. Segera kembali!`,confirmText:"MENGERTI",icon:"⚠",danger:true});}
    if(status.izin.overLimit&&!state.izinOverShown){state.izinOverShown=true;showCenterAlert({title:"🚨 BATAS WAKTU HABIS!",message:"Durasi izin Anda sudah melewati batas 15 menit!",submessage:"Segera kembali dan selesaikan izin keluar sekarang.",confirmText:"SEGERA KEMBALI",icon:"🚨",danger:true});}
  },10000);
}
function stopIzinStatusTimer(){if(state.izinStatusTimer){clearInterval(state.izinStatusTimer);state.izinStatusTimer=null;}}

// Broadcast auto-refresh setiap 30 detik
function startBroadcastTimer(){
  stopBroadcastTimer();
  state.broadcastTimer=setInterval(async()=>{
    const bc=await fetchBroadcast();
    const bar=document.querySelector(".broadcast-bar");
    const mainEl=document.querySelector(".main");
    if(!mainEl)return;
    if(bc&&bc.aktif&&bc.pesan){
      if(!bar){
        const newBar=document.createElement("div");
        newBar.className="broadcast-bar";
        newBar.innerHTML=`<div class="broadcast-bar-label"><i class="fa-solid fa-bullhorn"></i> BROADCAST</div><div class="broadcast-bar-text"><div class="broadcast-bar-inner">📢 ${bc.pesan} 📢 ${bc.pesan} 📢 ${bc.pesan}</div></div>`;
        mainEl.insertBefore(newBar,mainEl.firstChild);
      }
    }else{if(bar)bar.remove();}
  },30000);
}
function stopBroadcastTimer(){if(state.broadcastTimer){clearInterval(state.broadcastTimer);state.broadcastTimer=null;}}

// ══════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════
async function init(){
  state.currentUser=getStoredUser();state.hakAkses=getStoredAkses();
  if(state.currentUser){
    // Terapkan tema tersimpan
    const settings=await fetchSettings();applyTheme(settings.theme||"dark-blue");
  }
  renderApp();
}
init();
</script>
