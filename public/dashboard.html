<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>DASHBORD MANCINGDUIT</title>
  <link rel="icon" type="image/png" href="https://cdn.areabermain.club/assets/cdn/az9/2026/04/03/20260403/d6674e208289d4317cb6c43732467694/64x64.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
/* ══ TEMA VARIABEL ══════════════════════════════════════ */
:root{
  --bg-body:linear-gradient(90deg,#04112b,#071a3c);
  --sidebar-bg:#020d22;--sidebar-border:#20324d;
  --card-bg:#1d2a44;--card-border:#314462;
  --line:#30415d;--text:#f8fafc;--muted:#9fb0c7;
  --primary:#18c08f;--danger:#ef4444;--warning:#f59e0b;--info:#3b82f6;--gold:#f2d27a;
  --topbar-bg:rgba(4,17,40,.7);--content-bg:transparent;
  --table-bg:#0b1730;--table-head:#13213d;--table-border:#1e2f46;
  --input-bg:#071124;--input-border:#30415d;
  --btn-dark-bg:#13213b;
}
body.theme-dark-green{
  --bg-body:linear-gradient(90deg,#021a08,#04280f);
  --sidebar-bg:#011208;--sidebar-border:#1a3d20;
  --card-bg:#0f2e18;--card-border:#1a5c28;
  --primary:#22d37a;--topbar-bg:rgba(2,22,8,.8);
  --table-bg:#071a0e;--table-head:#0d2914;--table-border:#14391d;
  --input-bg:#030f06;
}
body.theme-dark-purple{
  --bg-body:linear-gradient(90deg,#120820,#1a0a30);
  --sidebar-bg:#0a0518;--sidebar-border:#2d1255;
  --card-bg:#1a1030;--card-border:#3d1f7a;
  --primary:#9d6fff;--topbar-bg:rgba(18,8,32,.8);
  --table-bg:#0e0820;--table-head:#180f38;--table-border:#2a1660;
  --input-bg:#0a0518;
}
body.theme-midnight{
  --bg-body:linear-gradient(90deg,#080808,#111111);
  --sidebar-bg:#050505;--sidebar-border:#252525;
  --card-bg:#141414;--card-border:#2a2a2a;
  --primary:#e8c547;--topbar-bg:rgba(5,5,5,.9);
  --table-bg:#0a0a0a;--table-head:#111;--table-border:#222;
  --input-bg:#0a0a0a;
}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',Arial,sans-serif;}
body{background:var(--bg-body);color:var(--text);min-height:100vh;overflow-x:hidden;}
.hidden{display:none!important;}

/* ══ LOGIN ══════════════════════════════════════════════ */
.login-page{min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px;background-image:linear-gradient(rgba(3,18,44,.66),rgba(3,18,44,.82)),url('https://cdn.areabermain.club/assets/cdn/az9/2026/04/01/20260401/72b7f1800f70492e27679ae35ad7784b/background-new-mancingduit.jpg');background-size:cover;background-position:center;}
.login-box{width:100%;max-width:430px;background:linear-gradient(180deg,rgba(4,47,37,.92),rgba(1,30,28,.92));border:1px solid rgba(76,197,176,.25);border-radius:28px;padding:28px;box-shadow:0 18px 40px rgba(0,0,0,.38);backdrop-filter:blur(10px);}
.login-logo{display:block;width:180px;max-width:80%;margin:0 auto 12px;}
.login-title{text-align:center;font-size:20px;font-weight:bold;color:#80f5d6;letter-spacing:1px;margin-bottom:2px;}
.login-sub{text-align:center;color:#b6d3d0;margin-bottom:18px;font-size:14px;letter-spacing:2px;}
.login-box h2{font-size:18px;margin-bottom:4px;}
.login-box p{color:var(--muted);margin-bottom:18px;}

/* ══ FORM ════════════════════════════════════════════════ */
.form-group{margin-bottom:14px;}
.form-group label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:#c8d8ea;}
.input,.select,.textarea{width:100%;padding:11px 14px;border-radius:12px;border:1px solid var(--input-border);background:var(--input-bg);color:var(--text);outline:none;font-size:14px;}
.textarea{min-height:90px;resize:vertical;}
.input:focus,.select:focus,.textarea:focus{border-color:var(--primary);box-shadow:0 0 0 2px rgba(24,192,143,.15);}
.select option{background:#071124;color:white;}

/* ══ BUTTONS ═════════════════════════════════════════════ */
.btn{border:none;cursor:pointer;padding:11px 16px;border-radius:12px;font-weight:700;transition:.2s;font-size:14px;display:inline-flex;align-items:center;gap:7px;}
.btn:hover{transform:translateY(-1px);filter:brightness(1.1);}
.btn:active{transform:translateY(0);}
.btn-primary{background:var(--primary);color:#052218;}
.btn-danger{background:var(--danger);color:white;}
.btn-warning{background:var(--warning);color:#281900;}
.btn-dark{background:var(--btn-dark-bg);color:white;border:1px solid var(--line);}
.btn-info{background:var(--info);color:white;}
.btn-gold{background:var(--gold);color:#2a1c00;}
.btn-success{background:#16a34a;color:white;}
.btn-purple{background:#7c3aed;color:white;}
.btn-teal{background:#0d9488;color:white;}
.btn-orange{background:#ea580c;color:white;}
.btn-block{width:100%;}
.btn-small{padding:7px 12px;font-size:12px;}
.btn-xs{padding:5px 9px;font-size:11px;}

/* ══ LAYOUT ══════════════════════════════════════════════ */
.app{display:flex;min-height:100vh;}
.sidebar{width:252px;background:var(--sidebar-bg);border-right:1px solid var(--sidebar-border);padding:18px 14px;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;}
.brand{padding-bottom:16px;border-bottom:1px solid var(--sidebar-border);margin-bottom:18px;}
.brand h2{color:#18e0a3;font-size:21px;margin-bottom:4px;}
.brand p{color:#a9b9d0;font-size:12px;}
.menu-title{font-size:11px;letter-spacing:1px;color:#6a8099;margin-bottom:8px;margin-top:6px;text-transform:uppercase;padding:0 4px;}
.menu{flex:1;overflow-y:auto;}
.menu button{width:100%;text-align:left;padding:10px 14px;background:transparent;color:#c8d8ea;border:none;border-radius:10px;margin-bottom:3px;cursor:pointer;font-weight:600;font-size:13px;display:flex;align-items:center;gap:9px;transition:.18s;}
.menu button:hover{background:rgba(255,255,255,.06);color:white;}
.menu button.active{background:linear-gradient(90deg,#053d3a,#05353a);border:1px solid rgba(24,192,143,.4);color:var(--primary);}
.menu button i{width:17px;text-align:center;font-size:13px;opacity:.8;}
.menu button.active i{opacity:1;}
.sidebar-footer{margin-top:auto;padding-top:14px;border-top:1px solid var(--sidebar-border);}
.sidebar-user{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;background:#0a1a32;}
.sidebar-avatar{width:36px;height:36px;border-radius:50%;border:2px solid #d7b24d;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:bold;background:#061227;color:#f9d97e;overflow:hidden;flex-shrink:0;}
.sidebar-avatar img{width:100%;height:100%;object-fit:cover;}
.sidebar-info{min-width:0;}
.sidebar-info b{font-size:13px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sidebar-info span{font-size:11px;color:#7a9ab8;}
.main{flex:1;display:flex;flex-direction:column;min-width:0;}

/* ══ BROADCAST BAR ═══════════════════════════════════════ */
.broadcast-bar{background:linear-gradient(90deg,#1a0c00,#2a1500,#1a0c00);border-bottom:1px solid #f59e0b;padding:8px 0;overflow:hidden;display:flex;align-items:center;}
.broadcast-bar-label{flex-shrink:0;padding:0 14px;display:flex;align-items:center;gap:6px;color:#f59e0b;font-weight:700;font-size:12px;border-right:1px solid #5c3d00;}
.broadcast-bar-text{flex:1;overflow:hidden;padding:0 10px;}
.broadcast-bar-inner{display:inline-block;white-space:nowrap;padding-left:100%;animation:broadcastScroll 25s linear infinite;color:#ffd46b;font-weight:600;font-size:13px;}
@keyframes broadcastScroll{0%{transform:translateX(0);}100%{transform:translateX(-100%);}}

/* ══ TOPBAR ══════════════════════════════════════════════ */
.topbar{padding:14px 20px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:15px;background:var(--topbar-bg);}
.topbar h3{font-size:20px;margin-bottom:3px;}
.topbar p{color:var(--muted);font-size:13px;}
.user-box{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.user-badge{border:1px solid #36517f;border-radius:12px;padding:8px 14px;background:#12213d;min-width:140px;}
.content{padding:18px 20px;flex:1;}

/* ══ GRID & CARD ════════════════════════════════════════ */
.grid{display:grid;gap:16px;}
.grid-4{grid-template-columns:repeat(4,1fr);}
.grid-3{grid-template-columns:repeat(3,1fr);}
.grid-2{grid-template-columns:repeat(2,1fr);}
.card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:16px;padding:18px;}
.card h4{font-size:17px;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.card h4 i{color:var(--primary);font-size:16px;}
.card p{color:var(--muted);line-height:1.6;font-size:14px;}
.stat .label{color:#b9c8dc;margin-bottom:8px;font-size:13px;}
.stat .value{font-size:36px;font-weight:bold;}
.stat .stat-icon{font-size:28px;margin-bottom:8px;}

/* ══ TABLE ═══════════════════════════════════════════════ */
.table-wrap{overflow:auto;margin-top:14px;border:1px solid #2e4260;border-radius:12px;}
table{width:100%;border-collapse:collapse;min-width:600px;background:var(--table-bg);}
th,td{padding:11px 13px;border-bottom:1px solid var(--table-border);text-align:left;font-size:13.5px;vertical-align:middle;}
th{background:var(--table-head);color:#d6e1ef;font-size:11px;text-transform:uppercase;letter-spacing:.5px;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,.025);}

/* ══ BADGES ══════════════════════════════════════════════ */
.actions{display:flex;gap:7px;flex-wrap:wrap;}
.badge{padding:4px 10px;border-radius:999px;font-size:11.5px;font-weight:700;display:inline-flex;align-items:center;gap:4px;}
.badge-success{background:#194f43;color:#89f2d4;}
.badge-danger{background:#63202b;color:#ffb9c2;}
.badge-warning{background:#5e4b18;color:#ffe07a;}
.badge-info{background:#244c8e;color:#b9d7ff;}
.badge-gold{background:#6a5620;color:#ffe49a;}
.badge-purple{background:#3b1d6e;color:#d4b3ff;}
.badge-muted{background:#1a2740;color:#8ca0be;}
.badge-teal{background:#0d4a47;color:#81e6d9;}
.badge-orange{background:#4a2200;color:#ffb366;}

/* ══ MODAL ═══════════════════════════════════════════════ */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;padding:20px;z-index:1000;}
.modal-box{width:100%;max-width:560px;background:linear-gradient(180deg,#1d2a44,#18253c);border:1px solid #3d5b87;border-radius:20px;padding:22px;box-shadow:0 20px 40px rgba(0,0,0,.35);max-height:90vh;overflow-y:auto;}
.modal-box-lg{max-width:800px;}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.modal-head h3{display:flex;align-items:center;gap:8px;}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.between{display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;}
.toast{position:fixed;right:20px;bottom:20px;background:#0d1930;border:1px solid #385177;border-radius:12px;padding:13px 16px;z-index:2000;min-width:210px;box-shadow:0 10px 25px rgba(0,0,0,.3);display:flex;align-items:center;gap:10px;animation:slideUp .25s ease;}
@keyframes slideUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.placeholder{text-align:center;padding:50px 20px;color:#b8c6d8;font-size:16px;}
.section-title{font-size:16px;font-weight:700;margin:18px 0 10px;display:flex;align-items:center;gap:8px;color:#d6e4f7;}
.section-title i{color:var(--primary);}

/* ══ STAFF HERO ══════════════════════════════════════════ */
.staff-hero{background:radial-gradient(circle at top left,rgba(242,210,122,.15),transparent 28%),radial-gradient(circle at bottom right,rgba(24,192,143,.12),transparent 30%),linear-gradient(180deg,#0b1531,#091227);border:1px solid #304766;border-radius:24px;padding:24px;overflow:hidden;}
.clock-box{font-size:42px;font-weight:bold;color:#ffd979;letter-spacing:2px;text-shadow:0 0 20px rgba(255,217,121,.15);}
.marquee-wrap{overflow:hidden;white-space:nowrap;border-radius:12px;border:1px solid #2b415f;background:#0d1a35;padding:9px 0;margin-top:12px;}
.marquee-inner{display:inline-block;white-space:nowrap;padding-left:100%;animation:marquee 18s linear infinite;color:#ffd979;font-weight:bold;}
@keyframes marquee{0%{transform:translateX(0);}100%{transform:translateX(-100%);}}
.hero-avatar{width:100px;height:100px;border-radius:50%;border:3px solid #d7b24d;display:flex;align-items:center;justify-content:center;font-size:46px;color:#f9d97e;background:#061227;margin:auto auto 14px;box-shadow:0 0 30px rgba(255,217,121,.12);overflow:hidden;cursor:pointer;transition:.2s;}
.hero-avatar:hover{transform:scale(1.04);}
.hero-avatar img{width:100%;height:100%;object-fit:cover;}
.center-card{max-width:460px;margin:auto;text-align:center;}
.quota-bar{height:9px;border-radius:999px;background:#0b1730;overflow:hidden;border:1px solid #274160;}
.quota-fill{height:100%;background:linear-gradient(90deg,#18c08f,#22d3ae);width:0%;transition:.5s;}
.izin-warning-box{background:#3a1116;border:1px solid #8a2836;border-radius:14px;padding:14px;color:#ffd4dc;font-size:14px;}

/* ══ SUPER ALERT ════════════════════════════════════════ */
.super-alert{width:100%;max-width:430px;border-radius:24px;border:2px solid #ff3b4d;background:radial-gradient(circle at top,rgba(255,0,25,.12),rgba(48,0,6,.96));box-shadow:0 0 40px rgba(255,0,30,.28);padding:26px;text-align:center;color:#ffd5da;}
.super-alert .icon{width:80px;height:80px;border-radius:50%;border:3px solid #ff3348;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;font-size:38px;color:#ff5d6d;}
.super-alert h2{font-size:26px;margin-bottom:10px;color:#ffb8c2;}
.super-alert p{color:#ffd7dc;line-height:1.6;font-size:14px;}
.super-alert .sub{margin-top:14px;background:rgba(255,255,255,.06);border-radius:14px;padding:12px;color:#ffd0d7;}
.super-alert .confirm{margin-top:16px;width:100%;padding:13px;background:#ff0018;border:none;border-radius:14px;color:white;font-weight:bold;font-size:17px;cursor:pointer;}

/* ══ AVATAR UPLOAD ════════════════════════════════════════ */
.avatar-upload-zone{position:relative;width:100px;height:100px;margin:0 auto 16px;cursor:pointer;}
.avatar-upload-zone .avatar-preview{width:100%;height:100%;border-radius:50%;border:3px solid #d7b24d;display:flex;align-items:center;justify-content:center;font-size:42px;color:#f9d97e;background:#061227;overflow:hidden;}
.avatar-upload-zone .avatar-preview img{width:100%;height:100%;object-fit:cover;}
.avatar-upload-zone .upload-overlay{position:absolute;inset:0;border-radius:50%;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;opacity:0;transition:.2s;color:white;font-size:22px;}
.avatar-upload-zone:hover .upload-overlay{opacity:1;}
.avatar-upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;border-radius:50%;}

/* ══ SETTINGS TABS ════════════════════════════════════════ */
.settings-tab{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;}
.settings-tab button{padding:8px 14px;border-radius:10px;border:1px solid var(--line);background:transparent;color:var(--muted);cursor:pointer;font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px;transition:.2s;}
.settings-tab button.active{background:#05353a;border-color:#1dbf97;color:#18e0a3;}
.settings-tab button:hover:not(.active){background:rgba(255,255,255,.05);}
.sub-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;border-bottom:1px solid var(--line);padding-bottom:12px;}
.sub-tabs button{padding:7px 14px;border-radius:8px;border:none;background:transparent;color:var(--muted);cursor:pointer;font-size:13px;font-weight:600;display:flex;align-items:center;gap:5px;transition:.15s;}
.sub-tabs button.active{background:#13213d;color:var(--primary);}
.sub-tabs button:hover:not(.active){color:white;}

/* ══ ROLE GROUP ═══════════════════════════════════════════ */
.role-group-card{background:#101e36;border:1px solid #2a3e5e;border-radius:14px;overflow:hidden;}
.role-group-header{padding:12px 16px;display:flex;align-items:center;gap:10px;background:#0d1930;}
.member-row{display:flex;align-items:center;gap:12px;padding:10px 16px;border-top:1px solid var(--table-border);}
.member-avatar{width:36px;height:36px;border-radius:50%;border:2px solid #2e4260;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:bold;background:#061227;color:#f9d97e;overflow:hidden;flex-shrink:0;}
.member-avatar img{width:100%;height:100%;object-fit:cover;}

/* ══ SOP ══════════════════════════════════════════════════ */
.sop-card{background:#101e36;border:1px solid #2a3e5e;border-radius:14px;overflow:hidden;margin-bottom:14px;transition:.2s;}
.sop-card:hover{border-color:#3a5580;}
.sop-header{padding:14px 18px;display:flex;align-items:center;gap:12px;cursor:pointer;}
.sop-header-info{flex:1;min-width:0;}
.sop-body{padding:0 18px 16px;border-top:1px solid var(--table-border);white-space:pre-wrap;font-size:14px;color:#c8d8ea;line-height:1.8;}
.sop-body.hidden{display:none;}

/* ══ KAS ══════════════════════════════════════════════════ */
.kas-stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:16px;}
.kas-stat{background:#0d1930;border:1px solid #2a3e5e;border-radius:14px;padding:16px;text-align:center;}
.kas-stat .ks-val{font-size:20px;font-weight:bold;margin-top:4px;}
.kas-stat .ks-lbl{font-size:12px;color:#7a9ab8;}
.trx-masuk td:first-child{border-left:3px solid #18c08f;}
.trx-keluar td:first-child{border-left:3px solid #ef4444;}
.bukti-thumb{width:60px;height:44px;object-fit:cover;border-radius:6px;cursor:pointer;border:1px solid #2e4260;}

/* ══ OTORITAS ════════════════════════════════════════════ */
.akses-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:18px;margin-top:16px;}
.akses-group{background:#0d1930;border:1px solid #2a3e5e;border-radius:14px;padding:14px;}
.akses-group h5{font-size:13px;color:#6dd5c8;font-weight:700;margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px;}
.akses-item{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid #1a2e46;}
.akses-item:last-child{border-bottom:none;}
.akses-item label{font-size:13px;color:#c8d8ea;cursor:pointer;flex:1;}
.toggle-switch{position:relative;width:40px;height:22px;flex-shrink:0;}
.toggle-switch input{opacity:0;width:0;height:0;position:absolute;}
.toggle-slider{position:absolute;inset:0;background:#1a2e46;border-radius:999px;cursor:pointer;transition:.3s;}
.toggle-slider:before{content:"";position:absolute;width:16px;height:16px;left:3px;top:3px;background:#8ca0be;border-radius:50%;transition:.3s;}
.toggle-switch input:checked + .toggle-slider{background:var(--primary);}
.toggle-switch input:checked + .toggle-slider:before{transform:translateX(18px);background:white;}

/* ══ SERAH TERIMA ════════════════════════════════════════ */
.st-card{background:linear-gradient(135deg,#0a1e36,#0d2240);border:1px solid #1e4080;border-radius:16px;padding:18px;margin-bottom:14px;position:relative;overflow:hidden;}
.st-card::before{content:"";position:absolute;top:0;left:0;width:4px;height:100%;background:var(--primary);}
.st-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
.st-field{margin-bottom:10px;}
.st-field label{font-size:12px;color:#7a9ab8;display:block;margin-bottom:4px;}
.st-field p{font-size:13.5px;color:#c8d8ea;line-height:1.6;}
.st-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

/* ══ PC-ONLY BLOCKER ════════════════════════════════════ */
.pc-only-block{text-align:center;padding:40px 20px;}
.pc-only-block .pc-icon{font-size:60px;margin-bottom:16px;color:#ef4444;}
.pc-only-block h3{font-size:22px;color:#ffb9c2;margin-bottom:10px;}
.pc-only-block p{color:#ff8fa0;font-size:15px;line-height:1.6;}

/* ══ THEME PREVIEW SWATCHES ════════════════════════════ */
.theme-swatch-row{display:flex;gap:12px;flex-wrap:wrap;margin-top:14px;}
.theme-swatch{width:80px;cursor:pointer;border-radius:12px;overflow:hidden;border:2px solid transparent;transition:.2s;}
.theme-swatch.selected{border-color:var(--primary);box-shadow:0 0 14px rgba(24,192,143,.3);}
.theme-swatch:hover{transform:scale(1.05);}
.swatch-preview{height:44px;display:flex;}
.swatch-sidebar{width:30%;background:#020d22;}
.swatch-main{flex:1;background:#071634;}

.theme-swatch.selected .swatch-label{color:var(--primary);}

.content > *{animation:fadeIn .22s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}

@media(max-width:980px){
  .app{flex-direction:column;}
  .sidebar{width:100%;position:relative;height:auto;}
  .menu{display:flex;flex-wrap:wrap;gap:5px;}
  .menu button{width:auto;margin-bottom:0;padding:8px 12px;font-size:12px;}
  .grid-4,.grid-3,.grid-2{grid-template-columns:1fr;}
  .topbar{flex-direction:column;align-items:flex-start;}
  .kas-stat-row{grid-template-columns:1fr;}
  .akses-grid{grid-template-columns:1fr;}

</style>
</head>
<body>
<div id="loginPage" class="login-page"></div>
<div id="appPage" class="app hidden"></div>
<div id="modalRoot"></div>
<div id="toastRoot"></div>
<script>
// ══════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════
let state={
  currentUser:null,hakAkses:null,
  currentMenu:"dashboard",currentSubMenu:null,
  currentSettingsTab:"tema",currentAksesJabatan:"KAPTEN",
  sopKatFilter:"Semua",
  clockTimer:null,izinStatusTimer:null,broadcastTimer:null,
  izinWarn14Shown:false,izinOverShown:false
};

// ══════════════════════════════════════════════════════
// PC / MOBILE DETECTION
// ══════════════════════════════════════════════════════
function isPC(){
  const w=window.innerWidth||document.documentElement.clientWidth||screen.width;
  const ua=navigator.userAgent||navigator.vendor||window.opera;
  const mobileUA=/android|webos|iphone|ipad|ipod|blackberry|iemobile|opera mini/i.test(ua.toLowerCase());
  return !mobileUA && w>=1024;
}

// ══════════════════════════════════════════════════════
// HAK AKSES
// ══════════════════════════════════════════════════════
function boleh(hak){
  if(!state.currentUser)return false;
  if(state.currentUser.role==="admin")return true;
  if(!state.hakAkses)return false;
  return !!state.hakAkses[hak];
}
function isCsLine(){return state.currentUser&&state.currentUser.jabatan==="CS LINE";}

// ══════════════════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════════════════
function toast(msg,isError=false){
  const id="t_"+Date.now();
  const icon=isError?"fa-circle-exclamation":"fa-circle-check";
  const color=isError?"#a33448":"#1dbf97";
  document.getElementById("toastRoot").innerHTML+=`<div id="${id}" class="toast" style="border-color:${color};"><i class="fa-solid ${icon}" style="color:${color};"></i><span>${msg}</span></div>`;
  setTimeout(()=>{const el=document.getElementById(id);if(el)el.remove();},2800);
}
function closeModal(){document.getElementById("modalRoot").innerHTML="";}
function showCenterAlert({title="PERINGATAN!",message="",submessage="",confirmText="MENGERTI",icon="⚠",danger=true}){
  const gold=!danger;
  document.getElementById("modalRoot").innerHTML=`<div class="modal"><div class="super-alert" style="${gold?"border-color:#d7b24d;background:radial-gradient(circle at top,rgba(242,210,122,.12),rgba(34,24,0,.94));":""}"><div class="icon" style="${gold?"border-color:#d7b24d;color:#ffd979;":""}">${icon}</div><h2>${title}</h2><p>${message}</p>${submessage?`<div class="sub">${submessage}</div>`:""}<button class="confirm" style="${gold?"background:#d7b24d;color:#281b00;":""}" onclick="closeModal()">${confirmText}</button></div></div>`;
}
function getStoredUser(){try{return JSON.parse(localStorage.getItem("currentUser"));}catch{return null;}}
function getStoredAkses(){try{return JSON.parse(localStorage.getItem("hakAkses"));}catch{return null;}}
function saveStoredUser(u){localStorage.setItem("currentUser",JSON.stringify(u));}
function saveStoredAkses(a){localStorage.setItem("hakAkses",JSON.stringify(a));}
function clearStoredUser(){localStorage.removeItem("currentUser");localStorage.removeItem("hakAkses");}
function handleLoginEnter(e){if(e.key==="Enter")submitLogin();}
function formatRp(n){return"Rp "+Number(n).toLocaleString("id-ID");}
function applyTheme(t){
  document.body.className=t&&t!=="dark-blue"?"theme-"+t:"";
}
async function fetchJson(url,opts={}){const r=await fetch(url,opts);return await r.json();}
async function fetchStaff(){try{const r=await fetchJson("/api/staff");return r.data||[];}catch{return[];}}
async function fetchAbsensi(){try{const r=await fetchJson("/api/absensi");return r.data||[];}catch{return[];}}
async function fetchDashboardSummary(){try{const r=await fetchJson("/api/dashboard-summary");return r.data||null;}catch{return null;}}
async function fetchIzinActive(){try{const r=await fetchJson("/api/izin/active");return r.data||[];}catch{return[];}}
async function fetchIzinHistory(){try{const r=await fetchJson("/api/izin/history");return r.data||[];}catch{return[];}}
async function fetchIzinStatus(userId){try{const r=await fetchJson(`/api/izin/status/${userId}`);return r.data||null;}catch{return null;}}
async function fetchSettings(){try{const r=await fetchJson("/api/settings");return r.data||{};}catch{return{};}};
async function fetchSop(){try{const r=await fetchJson("/api/sop");return r.data||[];}catch{return[];}}
async function fetchKas(){try{const r=await fetchJson("/api/kas");return r.data||{saldoAwal:0,transaksi:[],saldoAkhir:0};}catch{return{saldoAwal:0,transaksi:[],saldoAkhir:0};}}
async function fetchAkses(){try{const r=await fetchJson("/api/akses");return r.data||{};}catch{return{};}}
async function fetchSerahTerima(q=""){try{const r=await fetchJson("/api/serahterima"+q);return r.data||[];}catch{return[];}}
async function fetchBroadcast(){try{const r=await fetchJson("/api/broadcast");return r.data||{};}catch{return{};}}
async function refreshCurrentUser(){
  if(!state.currentUser)return null;
  try{const r=await fetchJson(`/api/staff/${state.currentUser.id}`);if(r.status==="success"){state.currentUser=r.data;saveStoredUser(r.data);return r.data;}}catch{}
  return state.currentUser;
}

// ══════════════════════════════════════════════════════
// AUTH
// ══════════════════════════════════════════════════════
function renderLogin(){
  document.getElementById("loginPage").innerHTML=`<div class="login-box">
    <img class="login-logo" src="https://cdn.areabermain.club/assets/cdn/az9/2026/03/30/20260330/08269ba667491cd811d1fe3c18da922c/logo-6.png" alt="Logo">
    <div class="login-title">DASHBORD MANCINGDUIT</div>
    <div class="login-sub">SISTEM OPERASIONAL STAFF</div>
    <h2>Selamat Datang</h2><p>Masuk untuk memulai aktivitas Anda</p>
    <div class="form-group"><label><i class="fa-solid fa-user" style="color:#18c08f;margin-right:5px;"></i>Username</label><input id="loginUsername" class="input" placeholder="Masukkan username" onkeydown="handleLoginEnter(event)"></div>
    <div class="form-group"><label><i class="fa-solid fa-lock" style="color:#18c08f;margin-right:5px;"></i>Password</label><input id="loginPassword" type="password" class="input" placeholder="Masukkan password" onkeydown="handleLoginEnter(event)"></div>
    <button class="btn btn-primary btn-block" onclick="submitLogin()"><i class="fa-solid fa-right-to-bracket"></i> Masuk</button>
  </div>`;
}
async function submitLogin(){
  const username=document.getElementById("loginUsername").value.trim();
  const password=document.getElementById("loginPassword").value.trim();
  if(!username||!password){toast("Username dan password wajib diisi",true);return;}
  try{
    const r=await fetch("/api/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username,password})});
    const result=await r.json();
    if(result.status!=="success"){toast(result.message||"Login gagal",true);return;}
    saveStoredUser(result.user);saveStoredAkses(result.hakAkses);
    state.currentUser=result.user;state.hakAkses=result.hakAkses;
    state.currentMenu="dashboard";state.izinWarn14Shown=false;state.izinOverShown=false;
    // Load dan apply tema
    const settings=await fetchSettings();
    applyTheme(settings.theme||"dark-blue");
    renderApp();toast("Login berhasil ✓");
  }catch{toast("Gagal terhubung ke server",true);}
}
function logout(){
  clearStoredUser();state.currentUser=null;state.hakAkses=null;state.currentMenu="dashboard";
  stopLiveClock();stopIzinStatusTimer();stopBroadcastTimer();
  document.body.className="";
  renderApp();toast("Logout berhasil");
}

// ══════════════════════════════════════════════════════
// MENU CONFIG
// ══════════════════════════════════════════════════════
function getMenusByRole(){
  if(!state.currentUser)return[];
  if(state.currentUser.role==="admin")return[
    {key:"dashboard",label:"Dashboard",icon:"fa-chart-line"},
    {key:"staff",label:"Data Staff",icon:"fa-users"},
    {key:"detailStaff",label:"Detail Staff",icon:"fa-sitemap"},
    {key:"absensi",label:"Data Absensi",icon:"fa-clipboard-list"},
    {key:"izin",label:"Izin Keluar Staff",icon:"fa-door-open"},
    {key:"shift",label:"Shift Kerja",icon:"fa-calendar-days"},
    {key:"historyAbsensi",label:"History Absensi",icon:"fa-clock-rotate-left"},
    {key:"historyIzin",label:"History Izin",icon:"fa-file-lines"},
    {key:"kasWeb",label:"Kas Web",icon:"fa-wallet"},
    {key:"sopPage",label:"Pusat Info & SOP",icon:"fa-book-open"},
    {key:"serahTerima",label:"Serah Terima CS LINE",icon:"fa-handshake"},
    {key:"otoritas",label:"Otoritas Hak Akses",icon:"fa-shield-halved"},
    {key:"settings",label:"Pengaturan",icon:"fa-gear"}
  ];
  const all=[
    {key:"dashboard",label:"Dashboard",icon:"fa-house",hak:null},
    {key:"absenSaya",label:"Absensi Saya",icon:"fa-fingerprint",hak:null},
    {key:"izinSaya",label:"Izin Keluar",icon:"fa-person-walking-arrow-right",hak:null},
    {key:"shiftSaya",label:"Shift Saya",icon:"fa-calendar",hak:null},
    {key:"kasWeb",label:"Kas Web",icon:"fa-wallet",hak:"bukaKas"},
    {key:"sopPage",label:"Pusat Info & SOP",icon:"fa-book-open",hak:"bukaSOP"},
    {key:"serahTerima",label:"Serah Terima",icon:"fa-handshake",hak:"bukaSerahTerima"},
    {key:"historyAbsensi",label:"History Absensi",icon:"fa-clock-rotate-left",hak:"bukaLaporan"},
    {key:"historySaya",label:"History Saya",icon:"fa-history",hak:null},
    {key:"profilSaya",label:"Profil Saya",icon:"fa-circle-user",hak:null}
  ];
  return all.filter(m=>m.hak===null||boleh(m.hak));
}
function getPageTitle(){
  const t={dashboard:state.currentUser?.role==="admin"?"Dashboard Admin":"Dashboard Staff",staff:"Data Staff",detailStaff:"Detail Staff",absensi:"Data Absensi",izin:"Izin Keluar Staff",shift:"Shift Kerja",historyAbsensi:"History Absensi",historyIzin:"History Izin",settings:"Pengaturan",kasWeb:"Manajemen Kas Web",sopPage:"Pusat Informasi & SOP",otoritas:"Otoritas Hak Akses",serahTerima:"Serah Terima CS LINE",absenSaya:"Absensi Saya",izinSaya:"Izin Keluar",shiftSaya:"Shift Saya",historySaya:"History Saya",profilSaya:"Profil Saya"};
  return t[state.currentMenu]||"Dashboard";
}
async function setMenu(menu){
  // Blokir izinSaya di HP
  if(menu==="izinSaya"&&!isPC()){
    showCenterAlert({title:"🚫 AKSES DITOLAK!",message:"AKSES DARI PC BUKAN HP, JANGAN COBA COBA MANIPULASI !",submessage:"Menu Izin Keluar hanya dapat diakses melalui komputer/PC untuk mencegah manipulasi.",confirmText:"MENGERTI",icon:"🚫",danger:true});
    return;
  }
  state.currentMenu=menu;state.currentSubMenu=null;await renderAppPage();
}

// ══════════════════════════════════════════════════════
// APP RENDER
// ══════════════════════════════════════════════════════
function renderApp(){
  const lp=document.getElementById("loginPage"),ap=document.getElementById("appPage");
  if(!state.currentUser){lp.classList.remove("hidden");ap.classList.add("hidden");renderLogin();return;}
  lp.classList.add("hidden");ap.classList.remove("hidden");renderAppPage();
}
async function renderAppPage(){
  const app=document.getElementById("appPage");
  const menus=getMenusByRole();
  const me=state.currentUser;const profile=me.profile||{};
  const menuHtml=menus.map(m=>`<button class="${state.currentMenu===m.key?"active":""}" onclick="setMenu('${m.key}')"><i class="fa-solid ${m.icon}"></i> ${m.label}</button>`).join("");
  const avatarEl=profile.avatarImage?`<img src="${profile.avatarImage}" style="width:100%;height:100%;object-fit:cover;">`:`<span style="font-size:15px;font-weight:bold;">${(profile.avatarText||me.nama.charAt(0)).slice(0,1).toUpperCase()}</span>`;
  const jabBadge=me.role==="admin"?`<span style="background:#3b1d6e;color:#d4b3ff;border-radius:6px;padding:2px 7px;font-size:11px;font-weight:700;">ADMIN</span>`:`<span style="background:#0d4a47;color:#81e6d9;border-radius:6px;padding:2px 7px;font-size:11px;font-weight:700;">${me.jabatan}</span>`;
  const contentHtml=await renderCurrentContent();
  // Broadcast bar
  const bc=await fetchBroadcast();
  const broadcastBar=bc&&bc.aktif&&bc.pesan?`<div class="broadcast-bar"><div class="broadcast-bar-label"><i class="fa-solid fa-bullhorn"></i> BROADCAST</div><div class="broadcast-bar-text"><div class="broadcast-bar-inner">📢 ${bc.pesan} 📢 ${bc.pesan} 📢 ${bc.pesan}</div></div></div>`:"";
  app.innerHTML=`
    <aside class="sidebar">
      <div class="brand"><h2 style="
  display:flex;
  align-items:center;
  gap:10px;
  font-weight:700;
  letter-spacing:1px;
">
  <img src="https://cdn.areabermain.club/assets/cdn/az4/2026/04/02/20260402/cc3bc2d49028db00bdc217edda866f5f/age-of-mythology-trailer-gif-by-age-of-empires-community.gif"
       style="
         width:38px;
         border-radius:8px;
         box-shadow:0 0 15px rgba(24,224,163,0.6);
       ">
  <span style="
    background: linear-gradient(45deg,#18e0a3,#00bfff);
    -webkit-background-clip:text;
    color:transparent;
  ">
    MancingDuit
  </span>
</h2><p>Sistem Operasional Staff</p></div>
      <div class="menu-title">Menu</div>
      <div class="menu">${menuHtml}</div>
      <div class="sidebar-footer">
        <div class="sidebar-user">
          <div class="sidebar-avatar">${avatarEl}</div>
          <div class="sidebar-info"><b>${profile.nickname||me.nama}</b><span>${me.jabatan||me.role}</span></div>
        </div>
        <button class="btn btn-danger btn-block" style="margin-top:10px;" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
      </div>
    </aside>
    <section class="main">
      ${broadcastBar}
      <div class="topbar">
        <div><h3>${getPageTitle()}</h3><p>${me.role==="admin"?"Kelola operasional staff dari satu dashboard":"Pantau aktivitas dan absensi Anda"}</p></div>
        <div class="user-box"><div class="user-badge"><b style="font-size:13px;">${me.nama}</b><br><div style="margin-top:3px;">${jabBadge}</div></div></div>
      </div>
      <div class="content">${contentHtml}</div>
    </section>`;
  if(me.role!=="admin"){startLiveClock();startIzinStatusTimer();}
  else{stopLiveClock();stopIzinStatusTimer();}
  startBroadcastTimer();
}
async function renderCurrentContent(){
  if(state.currentUser.role==="admin"){
    switch(state.currentMenu){
      case"dashboard":return await renderAdminDashboard();
      case"staff":return await renderStaffPage();
      case"detailStaff":return await renderDetailStaff();
      case"absensi":return await renderAbsensiAdmin();
      case"izin":return await renderIzinAdmin();
      case"shift":return await renderShiftPage();
      case"historyAbsensi":return await renderHistoryAbsensiAdmin();
      case"historyIzin":return await renderHistoryIzin();
      case"kasWeb":return await renderKasWeb(true);
      case"sopPage":return await renderSopPage(true);
      case"serahTerima":return await renderSerahTerima(true);
      case"otoritas":return await renderOtoritas();
      case"settings":return await renderSettings();
      default:return await renderAdminDashboard();
    }
  }
  switch(state.currentMenu){
    case"dashboard":return await renderStaffDashboard();
    case"absenSaya":return await renderAbsenSaya();
    case"izinSaya":
      if(!isPC())return renderIzinBlocked();
      return await renderIzinSaya();
    case"shiftSaya":return await renderShiftSaya();
    case"historyAbsensi":return await renderHistoryAbsensiAdmin();
    case"historySaya":return await renderHistorySaya();
    case"kasWeb":return await renderKasWeb(false);
    case"sopPage":return await renderSopPage(false);
    case"serahTerima":return await renderSerahTerima(false);
    case"profilSaya":return await renderProfilSaya();
    default:return await renderStaffDashboard();
  }
}
function renderIzinBlocked(){
  return`<div class="card" style="border-color:#ef4444;background:linear-gradient(135deg,#1a0308,#1d2a44);">
    <div class="pc-only-block">
      <div class="pc-icon"><i class="fa-solid fa-ban"></i></div>
      <h3>🚫 AKSES DITOLAK!</h3>
      <p><b>AKSES DARI PC BUKAN HP, JANGAN COBA COBA MANIPULASI !</b></p>
      <p style="margin-top:12px;">Menu Izin Keluar hanya dapat diakses melalui komputer/PC untuk mencegah manipulasi data.</p>
      <div style="margin-top:20px;padding:14px;background:rgba(239,68,68,.1);border-radius:12px;border:1px solid rgba(239,68,68,.3);">
        <p style="color:#fca5a5;">Jika Anda sedang di PC dan melihat pesan ini, pastikan browser dalam mode desktop.</p>
      </div>
    </div>
  </div>`;
}
function renderPlaceholder(msg){return`<div class="card"><div class="placeholder"><i class="fa-solid fa-circle-info" style="font-size:32px;margin-bottom:12px;display:block;color:#3b82f6;"></i>${msg}</div></div>`;}

// ══════════════════════════════════════════════════════
// ADMIN DASHBOARD
// ══════════════════════════════════════════════════════
async function renderAdminDashboard(){
  const summary=await fetchDashboardSummary();
  if(!summary)return renderPlaceholder("Gagal memuat dashboard.");
  const iconMap={Pagi:"fa-sun",Siang:"fa-cloud-sun",Sore:"fa-cloud",Malam:"fa-moon"};
  const shiftSections=["Pagi","Siang","Sore","Malam"].map(shift=>{
    const d=summary.shiftData[shift]||{totalStaff:0,hadir:[],belum:[]};
    return`<div class="card"><h4><i class="fa-solid ${iconMap[shift]}" style="color:#f59e0b;"></i>Shift ${shift}</h4>
      <div class="row" style="margin-bottom:12px;">
        <span class="badge badge-info"><i class="fa-solid fa-users"></i> ${d.totalStaff}</span>
        <span class="badge badge-success"><i class="fa-solid fa-check"></i> ${d.hadir.length} Hadir</span>
        <span class="badge badge-danger"><i class="fa-solid fa-clock"></i> ${d.belum.length} Belum</span>
      </div>
      ${d.hadir.length?`<div style="font-size:12px;color:#89f2d4;font-weight:700;margin-bottom:6px;">✓ SUDAH ABSEN</div>
        <div class="table-wrap"><table style="min-width:100%;"><thead><tr><th>Nama</th><th>Jabatan</th><th>Jam Masuk</th><th>Status</th></tr></thead>
        <tbody>${d.hadir.map(s=>`<tr><td>${s.nama}</td><td>${s.jabatan}</td><td>${s.jamMasuk}</td><td><span class="badge ${s.status==="Terlambat"?"badge-warning":"badge-success"}">${s.status||"Hadir"}</span></td></tr>`).join("")}</tbody></table></div>`:""}
      ${d.belum.length?`<div style="font-size:12px;color:#ffb9c2;font-weight:700;margin:10px 0 6px;">⏳ BELUM ABSEN</div>
        <div class="table-wrap"><table style="min-width:100%;"><thead><tr><th>Nama</th><th>Jabatan</th><th>Jam Kerja</th></tr></thead>
        <tbody>${d.belum.map(s=>`<tr><td>${s.nama}</td><td>${s.jabatan}</td><td>${s.shiftStartTime}</td></tr>`).join("")}</tbody></table></div>`:""}
    </div>`;
  }).join("");
  return`<div class="grid grid-4">
    <div class="card stat"><div class="stat-icon">👥</div><div class="label">Total Staff Aktif</div><div class="value" style="color:#18e0a3;">${summary.totalStaffAktif}</div></div>
    <div class="card stat"><div class="stat-icon">✅</div><div class="label">Sudah Absen</div><div class="value" style="color:#22c55e;">${summary.totalAbsenHariIni}</div></div>
    <div class="card stat"><div class="stat-icon">⏰</div><div class="label">Belum Absen</div><div class="value" style="color:#ef4444;">${summary.totalBelumAbsen}</div></div>
    <div class="card stat"><div class="stat-icon">🌙</div><div class="label">Shift Saat Ini</div><div class="value" style="font-size:24px;color:#f59e0b;">${summary.shiftSaatIni}</div></div>
  </div>
  <div class="section-title"><i class="fa-solid fa-calendar-day"></i>Zona Shift Kerja Hari Ini</div>
  <div class="grid grid-2">${shiftSections}</div>`;
}

// ══════════════════════════════════════════════════════
// STAFF DASHBOARD
// ══════════════════════════════════════════════════════
async function renderStaffDashboard(){
  await refreshCurrentUser();const staff=await fetchStaff();
  const me=staff.find(u=>Number(u.id)===Number(state.currentUser.id))||state.currentUser;
  const roster=["Pagi","Siang","Sore","Malam"].map(shift=>{
    const rows=staff.filter(u=>u.role==="staff"&&u.shift===shift);
    return`<div class="card"><h4 style="font-size:15px;">${shift}</h4>
      ${rows.length?rows.map(r=>`<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--table-border);">
        <div class="member-avatar" style="width:28px;height:28px;font-size:12px;">${r.profile?.avatarImage?`<img src="${r.profile.avatarImage}">`:r.nama.charAt(0).toUpperCase()}</div>
        <div><b style="font-size:13px;">${r.nama}</b><br><span style="color:#b8c6d8;font-size:12px;">${r.jabatan} • ${r.shiftStartTime}</span></div>
      </div>`).join(""):"<p>Belum ada staff.</p>"}</div>`;
  }).join("");
  return`<div class="staff-hero"><div class="grid grid-2">
    <div class="center-card">
      <div class="hero-avatar" onclick="setMenu('profilSaya')" title="Edit Profil">
        ${me.profile?.avatarImage?`<img src="${me.profile.avatarImage}">`:(me.profile?.avatarText||me.nama.charAt(0)).toUpperCase().slice(0,1)}
      </div>
      <h4 style="font-size:28px;">Selamat Datang 👋</h4>

async function toggleStaffActive(userId,cur){

}
async function deleteStaff(userId,nama){
  if(!confirm(`Hapus staff "${nama}" secara permanen?`))return;
  try{const r=await fetchJson(`/api/staff/${userId}`,{method:"DELETE"});if(r.status!=="success"){toast(r.message||"Gagal",true);return;}toast("Staff berhasil dihapus");await renderAppPage();}catch{toast("Server error",true);}

function openResetPasswordModal(userId,nama){
  document.getElementById("modalRoot").innerHTML=`<div class="modal"><div class="modal-box">
    <div class="modal-head"><h3><i class="fa-solid fa-key" style="color:#f59e0b;"></i>Reset Password</h3><button class="btn btn-dark btn-small" onclick="closeModal()">✕</button></div>

async function submitResetPassword(userId){
  const np=document.getElementById("rpNew").value.trim(),cp=document.getElementById("rpConfirm").value.trim();
  if(!np||!cp){toast("Wajib diisi",true);return;}if(np.length<4){toast("Minimal 4 karakter",true);return;}if(np!==cp){toast("Konfirmasi tidak sama",true);return;}
  try{const r=await fetchJson(`/api/staff/${userId}/reset-password`,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify({newPassword:np})});if(r.status!=="success"){toast(r.message||"Gagal",true);return;}closeModal();toast("Password berhasil direset");}catch{toast("Server error",true);}
}

async function renderHistoryAbsensiAdmin(){
  const sub=state.currentSubMenu||"harian";const rows=await fetchAbsensi();const users=await fetchStaff();const today=new Date().toISOString().split("T")[0];const bulanIni=today.slice(0,7);
  const tabs=`<div class="sub-tabs">${[{k:"harian",l:"Absensi Harian",i:"fa-calendar-day"},{k:"bulanan",l:"Bulanan",i:"fa-calendar"},{k:"perRole",l:"Per Role",i:"fa-sitemap"},{k:"terlambat",l:"Keterlambatan",i:"fa-triangle-exclamation"},{k:"export",l:"Export",i:"fa-download"}].map(t=>`<button class="${sub===t.k?"active":""}" onclick="setSubMenu('${t.k}')"><i class="fa-solid ${t.i}"></i> ${t.l}</button>`).join("")}</div>`;
  let c="";
  if(sub==="harian"){const harian=rows.filter(r=>r.tanggal===today);c=`<div class="card"><h4><i class="fa-solid fa-calendar-day"></i>Hari Ini — ${today}</h4><p>${harian.length} staff telah absen.</p></div><div class="table-wrap"><table><thead><tr><th>Nama</th><th>Jabatan</th><th>Shift</th><th>Jam Masuk</th><th>Status</th></tr></thead><tbody>${harian.length?harian.map(r=>`<tr><td><b>${r.nama}</b></td><td>${r.jabatan}</td><td>${r.shiftTerdaftar}</td><td>${r.jamMasuk}</td><td><span class="badge ${r.status==="Terlambat"?"badge-warning":"badge-success"}">${r.status||"Hadir"}</span></td></tr>`).join(""):`<tr><td colspan="5" style="text-align:center;color:#8ca0be;">Belum ada absensi hari ini.</td></tr>`}</tbody></table></div>`;}
  else if(sub==="bulanan"){const bln=rows.filter(r=>r.tanggal.startsWith(bulanIni));const grp={};bln.forEach(r=>{if(!grp[r.userId])grp[r.userId]={nama:r.nama,jabatan:r.jabatan,hadir:0,terlambat:0};grp[r.userId].hadir++;if(r.status==="Terlambat")grp[r.userId].terlambat++;});c=`<div class="card"><h4><i class="fa-solid fa-calendar"></i>Bulan ${bulanIni}</h4><p>${bln.length} record.</p></div><div class="table-wrap"><table><thead><tr><th>Nama</th><th>Jabatan</th><th>Hari Hadir</th><th>Terlambat</th></tr></thead><tbody>${Object.values(grp).map(g=>`<tr><td><b>${g.nama}</b></td><td>${g.jabatan}</td><td><span class="badge badge-success">${g.hadir} hari</span></td><td><span class="badge ${g.terlambat>0?"badge-warning":"badge-muted"}">${g.terlambat}x</span></td></tr>`).join("")||`<tr><td colspan="4" style="text-align:center;color:#8ca0be;">Belum ada data.</td></tr>`}</tbody></table></div>`;}
  else if(sub==="perRole"){c=`<div class="card"><h4><i class="fa-solid fa-sitemap"></i>Rekap Per Role — ${bulanIni}</h4></div><div class="grid grid-3" style="margin-top:14px;">${JABATAN_LIST.map(jab=>{const st=users.filter(u=>u.jabatan===jab&&u.active&&u.role==="staff");const ab=rows.filter(r=>r.tanggal.startsWith(bulanIni)&&st.some(s=>s.id===r.userId));return`<div class="card"><h4 style="font-size:14px;">${jab} (${st.length})</h4><p>Hadir: <b style="color:#18e0a3;">${ab.length}</b></p><p>Terlambat: <b style="color:#f59e0b;">${ab.filter(a=>a.status==="Terlambat").length}x</b></p></div>`;}).join("")}</div>`;}
  else if(sub==="terlambat"){const telat=rows.filter(r=>r.status==="Terlambat").sort((a,b)=>b.id-a.id);c=`<div class="card"><h4><i class="fa-solid fa-triangle-exclamation" style="color:#f59e0b;"></i>Keterlambatan (${telat.length})</h4></div><div class="table-wrap"><table><thead><tr><th>Tanggal</th><th>Nama</th><th>Jabatan</th><th>Shift</th><th>Jam Kerja</th><th>Jam Masuk</th></tr></thead><tbody>${telat.length?telat.map(r=>`<tr><td>${r.tanggal}</td><td><b>${r.nama}</b></td><td>${r.jabatan}</td><td>${r.shiftTerdaftar}</td><td>${r.shiftStartTime||"-"}</td><td style="color:#ffd979;font-weight:bold;">${r.jamMasuk}</td></tr>`).join(""):`<tr><td colspan="6" style="text-align:center;color:#8ca0be;">Tidak ada keterlambatan.</td></tr>`}</tbody></table></div>`;}
  else if(sub==="export"){c=`<div class="card"><h4><i class="fa-solid fa-download"></i>Export Data Absensi</h4><p>Download data absensi.</p><div class="row" style="margin-top:16px;"><button class="btn btn-success" onclick="exportCSV()"><i class="fa-solid fa-file-csv"></i> Export CSV</button><button class="btn btn-info" onclick="exportJSON()"><i class="fa-solid fa-file-code"></i> Export JSON</button></div></div>`;}
  return tabs+c;
}
function setSubMenu(sub){state.currentSubMenu=sub;renderAppPage();}
async function exportCSV(){const rows=await fetchAbsensi();const h=["ID","Nama","Username","Jabatan","Shift","Jam Kerja","Tanggal","Jam Masuk","Status"].join(",");const b=rows.map(r=>[r.id,r.nama,r.username,r.jabatan,r.shiftTerdaftar,r.shiftStartTime,r.tanggal,r.jamMasuk,r.status||"Hadir"].join(",")).join("\n");const blob=new Blob([h+"\n"+b],{type:"text/csv"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=`absensi_${new Date().toISOString().split("T")[0]}.csv`;a.click();URL.revokeObjectURL(url);toast("Export CSV berhasil");}
async function exportJSON(){const rows=await fetchAbsensi();const blob=new Blob([JSON.stringify(rows,null,2)],{type:"application/json"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=`absensi_${new Date().toISOString().split("T")[0]}.json`;a.click();URL.revokeObjectURL(url);toast("Export JSON berhasil");}
async function renderHistoryIzin(){const rows=await fetchIzinHistory();return`<div class="card"><h4><i class="fa-solid fa-file-lines"></i>History Izin Keluar</h4></div><div class="table-wrap"><table><thead><tr><th>ID</th><th>Nama</th><th>Jabatan</th><th>Tanggal</th><th>Keluar</th><th>Kembali</th><th>Durasi</th><th>Status</th></tr></thead><tbody>${rows.length?rows.map(i=>`<tr><td>${i.id}</td><td><b>${i.nama}</b></td><td>${i.jabatan}</td><td>${i.tanggal}</td><td>${i.jamKeluar}</td><td>${i.jamKembali||"-"}</td><td>${i.durasiMenit||0} mnt</td><td><span class="badge ${i.status==="Melewati Batas"?"badge-danger":i.status==="Aktif"?"badge-warning":"badge-success"}">${i.status}</span></td></tr>`).join(""):`<tr><td colspan="8" style="text-align:center;color:#8ca0be;">Belum ada history.</td></tr>`}</tbody></table></div>`;}

const KATEGORI_SOP=["Umum","Absensi","Izin","Pelayanan","Kasir","Operasional","Keamanan"];
const PRIORITAS_SOP=["Normal","Penting","Kritis"];
const PRIORITAS_COLOR={Normal:"badge-muted",Penting:"badge-warning",Kritis:"badge-danger"};
async function renderSopPage(isAdmin){
  const sops=await fetchSop();const katFilter=state.sopKatFilter||"Semua";
  const filteredSops=katFilter==="Semua"?sops:sops.filter(s=>s.kategori===katFilter);
  const adminBar=isAdmin?`<div class="between" style="margin-bottom:16px;"><div></div><button class="btn btn-primary" onclick="openAddSopModal()"><i class="fa-solid fa-plus"></i> Tambah SOP/Info</button></div>`:"";
  const katTabs=`<div class="sub-tabs" style="margin-bottom:14px;">${["Semua",...KATEGORI_SOP].map(k=>`<button class="${(state.sopKatFilter||"Semua")===k?"active":""}" onclick="setSopFilter('${k}')">${k}</button>`).join("")}</div>`;
  const sopList=filteredSops.length?filteredSops.map(s=>`<div class="sop-card"><div class="sop-header" onclick="toggleSop('sop_body_${s.id}')">
    <div style="width:36px;height:36px;border-radius:10px;background:#0d1930;display:flex;align-items:center;justify-content:center;flex-shrink:0;"><i class="fa-solid fa-file-lines" style="color:#6dd5c8;"></i></div>
    <div class="sop-header-info"><b style="font-size:14px;">${s.judul}</b><div style="font-size:12px;color:#7a9ab8;margin-top:3px;"><span class="badge badge-teal" style="font-size:10px;">${s.kategori}</span><span class="badge ${PRIORITAS_COLOR[s.prioritas]||"badge-muted"}" style="font-size:10px;margin-left:4px;">${s.prioritas}</span><span style="margin-left:8px;">Oleh: ${s.dibuat_oleh} • ${s.tanggal}</span></div></div>
    <div style="display:flex;align-items:center;gap:8px;">
      ${isAdmin?`<button class="btn btn-info btn-xs" onclick="event.stopPropagation();openEditSopModal(${s.id})"><i class="fa-solid fa-pen"></i></button><button class="btn btn-danger btn-xs" onclick="event.stopPropagation();deleteSop(${s.id})"><i class="fa-solid fa-trash"></i></button>`:""}
      <i class="fa-solid fa-chevron-down" style="color:#6a8099;transition:.2s;"></i>
    </div>
  </div><div class="sop-body hidden" id="sop_body_${s.id}">${s.konten}</div></div>`).join(""):`<div class="card"><div class="placeholder">Belum ada SOP untuk kategori ini.</div></div>`;
  return`<div class="card" style="margin-bottom:16px;"><h4><i class="fa-solid fa-book-open"></i>Pusat Informasi & SOP</h4><p>Peraturan operasional dan standar prosedur kerja. Baca dengan teliti.</p></div>${adminBar}${katTabs}${sopList}`;
}
function setSopFilter(k){state.sopKatFilter=k;renderAppPage();}
function toggleSop(id){const el=document.getElementById(id);if(!el)return;el.classList.toggle("hidden");const arrow=el.previousElementSibling?.querySelector(".fa-chevron-down");if(arrow)arrow.style.transform=el.classList.contains("hidden")?"":"rotate(180deg)";}
function openAddSopModal(){
  document.getElementById("modalRoot").innerHTML=`<div class="modal"><div class="modal-box modal-box-lg"><div class="modal-head"><h3><i class="fa-solid fa-plus" style="color:#18c08f;"></i>Tambah SOP / Informasi</h3><button class="btn btn-dark btn-small" onclick="closeModal()">✕</button></div>
  <div class="form-group"><label>Judul</label><input id="sopJudul" class="input" placeholder="Judul SOP atau informasi"></div>
  <div class="grid grid-2"><div class="form-group"><label>Kategori</label><select id="sopKategori" class="select">${KATEGORI_SOP.map(k=>`<option>${k}</option>`).join("")}</select></div><div class="form-group"><label>Prioritas</label><select id="sopPrioritas" class="select">${PRIORITAS_SOP.map(p=>`<option>${p}</option>`).join("")}</select></div></div>
  <div class="form-group"><label>Konten / Isi</label><textarea id="sopKonten" class="textarea" style="min-height:160px;" placeholder="Tulis isi SOP..."></textarea></div>
  <div class="row" style="margin-top:12px;"><button class="btn btn-primary" onclick="saveSop()"><i class="fa-solid fa-save"></i> Simpan</button><button class="btn btn-dark" onclick="closeModal()">Batal</button></div>
  </div></div>`;
}
async function saveSop(){const judul=document.getElementById("sopJudul").value.trim();const kategori=document.getElementById("sopKategori").value;const prioritas=document.getElementById("sopPrioritas").value;const konten=document.getElementById("sopKonten").value.trim();if(!judul||!konten){toast("Judul dan konten wajib diisi",true);return;}try{const r=await fetchJson("/api/sop",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({judul,kategori,prioritas,konten,dibuat_oleh:state.currentUser.nama})});if(r.status!=="success"){toast(r.message||"Gagal",true);return;}closeModal();toast("SOP berhasil ditambahkan");await renderAppPage();}catch{toast("Server error",true);}}
async function openEditSopModal(id){const sops=await fetchSop();const s=sops.find(x=>x.id===id);if(!s)return;document.getElementById("modalRoot").innerHTML=`<div class="modal"><div class="modal-box modal-box-lg"><div class="modal-head"><h3><i class="fa-solid fa-pen" style="color:#3b82f6;"></i>Edit SOP</h3><button class="btn btn-dark btn-small" onclick="closeModal()">✕</button></div><div class="form-group"><label>Judul</label><input id="eSopJudul" class="input" value="${s.judul}"></div><div class="grid grid-2"><div class="form-group"><label>Kategori</label><select id="eSopKategori" class="select">${KATEGORI_SOP.map(k=>`<option ${s.kategori===k?"selected":""}>${k}</option>`).join("")}</select></div><div class="form-group"><label>Prioritas</label><select id="eSopPrioritas" class="select">${PRIORITAS_SOP.map(p=>`<option ${s.prioritas===p?"selected":""}>${p}</option>`).join("")}</select></div></div><div class="form-group"><label>Konten</label><textarea id="eSopKonten" class="textarea" style="min-height:160px;">${s.konten}</textarea></div><div class="row" style="margin-top:12px;"><button class="btn btn-primary" onclick="updateSop(${id})"><i class="fa-solid fa-save"></i> Simpan</button><button class="btn btn-dark" onclick="closeModal()">Batal</button></div></div></div>`;}
async function updateSop(id){const judul=document.getElementById("eSopJudul").value.trim();const kategori=document.getElementById("eSopKategori").value;const prioritas=document.getElementById("eSopPrioritas").value;const konten=document.getElementById("eSopKonten").value.trim();try{const r=await fetchJson(`/api/sop/${id}`,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify({judul,kategori,prioritas,konten})});if(r.status!=="success"){toast(r.message||"Gagal",true);return;}closeModal();toast("SOP berhasil diperbarui");await renderAppPage();}catch{toast("Server error",true);}}
async function deleteSop(id){if(!confirm("Hapus SOP ini?"))return;try{const r=await fetchJson(`/api/sop/${id}`,{method:"DELETE"});if(r.status!=="success"){toast(r.message||"Gagal",true);return;}toast("SOP berhasil dihapus");await renderAppPage();}catch{toast("Server error",true);}}

async function renderKasWeb(isAdmin){
  const kas=await fetchKas();const trx=kas.transaksi||[];const saldoAkhir=kas.saldoAkhir||0;
  const totalMasuk=trx.filter(t=>t.tipe==="masuk").reduce((a,t)=>a+t.jumlah,0);
  const totalKeluar=trx.filter(t=>t.tipe==="keluar").reduce((a,t)=>a+t.jumlah,0);
  const canInput=isAdmin||boleh("inputTransaksi");const canDelete=isAdmin||boleh("hapusTransaksiKas");
  const saldoAwalForm=isAdmin?`<div class="card" style="margin-bottom:14px;"><h4><i class="fa-solid fa-coins" style="color:#f59e0b;"></i>Atur Saldo Awal</h4><div class="row"><input id="inputSaldoAwal" type="number" class="input" style="max-width:220px;" placeholder="Nominal saldo awal" value="${kas.saldoAwal}"><button class="btn btn-warning" onclick="saveSaldoAwal()"><i class="fa-solid fa-save"></i> Simpan</button></div></div>`:"";
  const inputTrxForm=canInput?`<div class="card" style="margin-bottom:14px;"><h4><i class="fa-solid fa-plus-circle" style="color:#18c08f;"></i>Input Transaksi</h4>
    <div class="grid grid-2">
      <div class="form-group"><label>Tipe</label><select id="trxTipe" class="select"><option value="masuk">💰 Pemasukan</option><option value="keluar">💸 Pengeluaran</option></select></div>
      <div class="form-group"><label>Jumlah (Rp)</label><input id="trxJumlah" type="number" class="input" placeholder="Nominal"></div>
      <div class="form-group"><label>Kategori</label><select id="trxKategori" class="select"><option>Operasional</option><option>ATK</option><option>Konsumsi</option><option>Transport</option><option>Utilitas</option><option>Lainnya</option></select></div>
      <div class="form-group"><label>Keterangan</label><input id="trxKet" class="input" placeholder="Keterangan singkat"></div>
    </div>
    <div class="form-group"><label>Bukti (Upload Foto)</label><input type="file" accept="image/*" onchange="previewBukti(this)" class="input" style="padding:8px;"><div id="buktiPreviewContainer" style="margin-top:8px;"></div></div>
    <div class="row" style="margin-top:10px;"><button class="btn btn-primary" onclick="saveTrx()"><i class="fa-solid fa-save"></i> Catat Transaksi</button></div>
  </div>`:"";
  return`${saldoAwalForm}
  <div class="kas-stat-row">
    <div class="kas-stat"><div class="ks-lbl">Saldo Awal</div><div class="ks-val" style="color:#f59e0b;">${formatRp(kas.saldoAwal)}</div></div>
    <div class="kas-stat"><div class="ks-lbl">Total Pemasukan</div><div class="ks-val" style="color:#18e0a3;">+${formatRp(totalMasuk)}</div></div>
    <div class="kas-stat"><div class="ks-lbl">Total Pengeluaran</div><div class="ks-val" style="color:#ef4444;">-${formatRp(totalKeluar)}</div></div>
  </div>
  <div class="card" style="margin-bottom:14px;background:linear-gradient(135deg,#0d1e38,#0a2a1e);border-color:${saldoAkhir>=0?"#1dbf97":"#ef4444"};">
    <div style="display:flex;align-items:center;justify-content:space-between;">
      <div><div style="font-size:13px;color:#7a9ab8;">SALDO AKHIR</div><div style="font-size:32px;font-weight:bold;color:${saldoAkhir>=0?"#18e0a3":"#ef4444"};">${formatRp(saldoAkhir)}</div></div>
      <i class="fa-solid fa-wallet" style="font-size:40px;color:${saldoAkhir>=0?"rgba(24,192,143,.2)":"rgba(239,68,68,.2)"};"></i>
    </div>
  </div>
  ${inputTrxForm}
  <div class="section-title"><i class="fa-solid fa-list"></i>Riwayat Transaksi</div>
  <div class="table-wrap"><table><thead><tr><th>Tgl</th><th>Tipe</th><th>Kategori</th><th>Keterangan</th><th>Jumlah</th><th>Oleh</th><th>Bukti</th>${canDelete?"<th>Hapus</th>":""}</tr></thead>
  <tbody>${trx.slice().reverse().length?trx.slice().reverse().map(t=>`<tr class="${t.tipe==="masuk"?"trx-masuk":"trx-keluar"}"><td style="white-space:nowrap;">${t.tanggal}</td><td><span class="badge ${t.tipe==="masuk"?"badge-success":"badge-danger"}">${t.tipe==="masuk"?"💰 Masuk":"💸 Keluar"}</span></td><td>${t.kategori}</td><td>${t.keterangan}</td><td style="font-weight:bold;color:${t.tipe==="masuk"?"#18e0a3":"#ef4444"};">${t.tipe==="masuk"?"+":"-"}${formatRp(t.jumlah)}</td><td>${t.dicatat_oleh}</td><td>${t.bukti?`<img src="${t.bukti}" class="bukti-thumb" onclick="lihatBukti('${t.bukti}')" title="Lihat bukti">`:"-"}</td>${canDelete?`<td><button class="btn btn-danger btn-xs" onclick="deleteTrx(${t.id})"><i class="fa-solid fa-trash"></i></button></td>`:""}</tr>`).join(""):`<tr><td colspan="${canDelete?8:7}" style="text-align:center;color:#8ca0be;">Belum ada transaksi.</td></tr>`}</tbody></table></div>`;
}
let buktiBase64="";
function previewBukti(input){const file=input.files[0];if(!file)return;const reader=new FileReader();reader.onload=function(e){buktiBase64=e.target.result;const c=document.getElementById("buktiPreviewContainer");if(c)c.innerHTML=`<img src="${buktiBase64}" style="max-height:80px;border-radius:8px;border:1px solid #2e4260;">`;};reader.readAsDataURL(file);}
async function saveSaldoAwal(){const saldoAwal=Number(document.getElementById("inputSaldoAwal").value);try{const r=await fetchJson("/api/kas/saldo-awal",{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify({saldoAwal})});if(r.status!=="success"){toast(r.message||"Gagal",true);return;}toast("Saldo awal diperbarui");await renderAppPage();}catch{toast("Server error",true);}}
async function saveTrx(){const tipe=document.getElementById("trxTipe").value;const jumlah=Number(document.getElementById("trxJumlah").value);const kategori=document.getElementById("trxKategori").value;const keterangan=document.getElementById("trxKet").value.trim();if(!jumlah||!keterangan){toast("Jumlah dan keterangan wajib diisi",true);return;}try{const body={tipe,jumlah,kategori,keterangan,dicatat_oleh:state.currentUser.nama,bukti:buktiBase64||""};const r=await fetchJson("/api/kas/transaksi",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});if(r.status!=="success"){toast(r.message||"Gagal",true);return;}buktiBase64="";toast("Transaksi berhasil dicatat");await renderAppPage();}catch{toast("Server error",true);}}
async function deleteTrx(id){if(!confirm("Hapus transaksi ini?"))return;try{const r=await fetchJson(`/api/kas/transaksi/${id}`,{method:"DELETE"});if(r.status!=="success"){toast(r.message||"Gagal",true);return;}toast("Transaksi dihapus");await renderAppPage();}catch{toast("Server error",true);}}
function lihatBukti(src){document.getElementById("modalRoot").innerHTML=`<div class="modal" onclick="closeModal()"><div style="max-width:700px;width:100%;text-align:center;"><img src="${src}" style="max-width:100%;border-radius:14px;box-shadow:0 20px 40px rgba(0,0,0,.5);"><p style="color:#aaa;margin-top:10px;font-size:13px;">Klik di mana saja untuk menutup</p></div></div>`;}

async function renderSerahTerima(isAdmin){
  const data=await fetchSerahTerima();
  const statusOpts=["Normal","Ada Kendala","Perlu Perhatian","Kritis"];
  const statusColor={"Normal":"badge-success","Ada Kendala":"badge-warning","Perlu Perhatian":"badge-orange","Kritis":"badge-danger"};
  const formSection=!isAdmin?`
    <div class="card" style="margin-bottom:16px;border-color:rgba(13,148,136,.4);background:linear-gradient(135deg,#071e2a,#0d2a1e);">
      <h4><i class="fa-solid fa-pen-to-square" style="color:#81e6d9;"></i>Buat Laporan Serah Terima</h4>
      <p>Isi laporan harian sebelum selesai shift.</p>
      <div class="st-grid" style="margin-top:16px;">
        <div class="form-group"><label>Shift Dari (Petugas Saat Ini)</label><input id="stDari" class="input" value="${state.currentUser.nama}" readonly></div>
        <div class="form-group"><label>Shift Ke (Petugas Berikutnya)</label><input id="stKe" class="input" placeholder="Nama petugas CS LINE berikutnya"></div>
        <div class="form-group"><label>Shift Dari</label><select id="stShiftDari" class="select"><option>Pagi</option><option>Siang</option><option>Sore</option><option>Malam</option></select></div>
        <div class="form-group"><label>Shift Ke</label><select id="stShiftKe" class="select"><option>Pagi</option><option>Siang</option><option>Sore</option><option>Malam</option></select></div>
      </div>
      <div class="form-group"><label>Ringkasan Aktivitas Hari Ini <span style="color:#ef4444;">*</span></label><textarea id="stRingkasan" class="textarea" placeholder="Ceritakan aktivitas utama shift ini..."></textarea></div>
      <div class="st-grid">
        <div class="form-group"><label>Kendala yang Terjadi</label><textarea id="stKendala" class="textarea" style="min-height:70px;" placeholder="Tuliskan kendala jika ada (isi 'Tidak ada' jika lancar)">Tidak ada</textarea></div>
        <div class="form-group"><label>Tindakan yang Sudah Diambil</label><textarea id="stTindakan" class="textarea" style="min-height:70px;" placeholder="Apa yang sudah dilakukan untuk menangani kendala?"></textarea></div>
      </div>
      <div class="st-grid">
        <div class="form-group"><label>Status Sistem/Kondisi</label><select id="stStatus" class="select">${statusOpts.map(s=>`<option>${s}</option>`).join("")}</select></div>
        <div class="form-group"><label>Catatan Tambahan</label><input id="stCatatan" class="input" placeholder="Info penting lainnya untuk shift berikutnya"></div>
      </div>
      <div class="row" style="margin-top:14px;">
        <button class="btn btn-teal" onclick="saveSerahTerima()"><i class="fa-solid fa-handshake"></i> Kirim Laporan Serah Terima</button>
      </div>
    </div>`:"";
  const adminBar=isAdmin?`<div class="between" style="margin-bottom:14px;"><div class="card" style="flex:1;"><h4><i class="fa-solid fa-handshake"></i>Serah Terima CS LINE</h4><p>Pantau laporan serah terima antar shift CS LINE.</p></div></div>`:"";
  const cards=data.length?data.map(d=>`<div class="st-card">
    <div class="st-meta">
      <span class="badge badge-teal"><i class="fa-solid fa-calendar"></i> ${d.tanggal} • ${d.jam}</span>
      <span class="badge ${statusColor[d.status_sistem]||"badge-muted"}">${d.status_sistem}</span>
      <span class="badge badge-muted"><i class="fa-solid fa-person-walking-arrow-right"></i> ${d.shift_dari||"-"} → ${d.shift_ke||"-"}</span>

      <div class="st-field"><label>Serah ke</label><p><b>${d.petugas_ke||"-"}</b> (Shift ${d.shift_ke})</p></div>
      <div class="st-field" style="grid-column:1/-1;"><label>Ringkasan Aktivitas</label><p>${d.ringkasan}</p></div>
      <div class="st-field"><label>Kendala</label><p style="color:${d.kendala==="Tidak ada"?"#89f2d4":"#ffe07a"};">${d.kendala}</p></div>
      <div class="st-field"><label>Tindakan</label><p>${d.tindakan||"-"}</p></div>

}
async function saveSerahTerima(){
  const petugas_dari=document.getElementById("stDari").value;const petugas_ke=document.getElementById("stKe").value.trim();const shift_dari=document.getElementById("stShiftDari").value;const shift_ke=document.getElementById("stShiftKe").value;const ringkasan=document.getElementById("stRingkasan").value.trim();const kendala=document.getElementById("stKendala").value.trim();const tindakan=document.getElementById("stTindakan").value.trim();const status_sistem=document.getElementById("stStatus").value;const catatan=document.getElementById("stCatatan").value.trim();
  if(!ringkasan){toast("Ringkasan aktivitas wajib diisi",true);return;}
  try{const r=await fetchJson("/api/serahterima",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({petugas_dari,petugas_ke,shift_dari,shift_ke,ringkasan,kendala,tindakan,status_sistem,catatan})});if(r.status!=="success"){toast(r.message||"Gagal",true);return;}toast("Laporan serah terima berhasil dikirim ✓");await renderAppPage();}catch{toast("Server error",true);}
}
async function deleteSerahTerima(id){if(!confirm("Hapus laporan ini?"))return;try{const r=await fetchJson(`/api/serahterima/${id}`,{method:"DELETE"});if(r.status!=="success"){toast(r.message||"Gagal",true);return;}toast("Laporan dihapus");await renderAppPage();}catch{toast("Server error",true);}}

const JABATAN_OTORITAS=["KAPTEN","CS LINE","KASIR","CS"];
async function renderOtoritas(){
  const akses=await fetchAkses();const jabatan=state.currentAksesJabatan||"KAPTEN";const currentAkses=akses[jabatan]||{};
  const jabatanTabs=JABATAN_OTORITAS.map(j=>`<button onclick="setAksesJabatan('${j}')" style="padding:8px 16px;border-radius:10px;border:1px solid ${j===jabatan?"#1dbf97":"var(--line)"};background:${j===jabatan?"#05353a":"transparent"};color:${j===jabatan?"#18e0a3":"var(--muted)"};cursor:pointer;font-size:13px;font-weight:600;">${j}</button>`).join("");
  const aksesGrups=ALL_HAK.map(g=>`<div class="akses-group"><h5>${g.grup}</h5>${g.items.map(item=>`<div class="akses-item"><label for="ak_${item.key}">${item.label}</label><label class="toggle-switch"><input type="checkbox" id="ak_${item.key}" ${currentAkses[item.key]?"checked":""}><span class="toggle-slider"></span></label></div>`).join("")}</div>`).join("");
  return`<div class="card" style="border-color:#8a2836;background:linear-gradient(135deg,#1a0a14,#1d2a44);margin-bottom:16px;"><div class="between"><div><h4><i class="fa-solid fa-lock" style="color:#ff6b6b;"></i>Otoritas Hak Akses Per Jabatan</h4><p>Atur hak akses menu dan fitur untuk setiap jabatan staff.</p><p style="color:#ffb9c2;font-size:12px;margin-top:6px;"><i class="fa-solid fa-triangle-exclamation"></i> Jabatan ADMIN memiliki hak akses mutlak dan tidak dapat dibatasi.</p></div><button class="btn btn-gold" onclick="saveAkses()"><i class="fa-solid fa-save"></i> Simpan Hak Akses</button></div></div>
  <div style="margin-bottom:20px;"><b style="font-size:13px;color:#8ca0be;display:block;margin-bottom:8px;">Pilih Jabatan untuk Diedit:</b><div style="display:flex;gap:8px;flex-wrap:wrap;">${jabatanTabs}</div></div>
  <div class="akses-grid">${aksesGrups}</div>`;
}
function setAksesJabatan(j){state.currentAksesJabatan=j;renderAppPage();}
async function saveAkses(){
  const jabatan=state.currentAksesJabatan||"KAPTEN";const body={};
  ALL_HAK.forEach(g=>g.items.forEach(item=>{const el=document.getElementById(`ak_${item.key}`);if(el)body[item.key]=el.checked;}));
  try{const r=await fetchJson(`/api/akses/${encodeURIComponent(jabatan)}`,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});if(r.status!=="success"){toast(r.message||"Gagal",true);return;}toast(`Hak akses ${jabatan} berhasil disimpan ✓`);}catch{toast("Server error",true);}
}

async function renderSettings(){
  const tab=state.currentSettingsTab||"tema";const settings=await fetchSettings();const bc=await fetchBroadcast();
  const tabHtml=`<div class="settings-tab">${[{k:"tema",l:"Tampilan & Tema",i:"fa-palette"},{k:"broadcast",l:"Broadcast & Notifikasi",i:"fa-bullhorn"},{k:"staff",l:"Manajemen Staff",i:"fa-users-gear"}].map(t=>`<button class="${tab===t.k?"active":""}" onclick="setSettingsTab('${t.k}')"><i class="fa-solid ${t.i}"></i> ${t.l}</button>`).join("")}</div>`;
  let c="";
  if(tab==="tema"){
    const themes=[{id:"dark-blue",label:"Dark Blue",sidebar:"#020d22",main:"#071634"},{id:"dark-green",label:"Dark Green",sidebar:"#011208",main:"#04280f"},{id:"dark-purple",label:"Dark Purple",sidebar:"#0a0518",main:"#1a0a30"},{id:"midnight",label:"Midnight",sidebar:"#050505",main:"#111111"}];
    const current=settings.theme||"dark-blue";
    c=`<div class="card"><h4><i class="fa-solid fa-palette"></i>Pengaturan Tampilan & Tema</h4><p>Pilih tema warna dashboard. Perubahan langsung diterapkan saat disimpan.</p>
    <div class="theme-swatch-row">${themes.map(t=>`<div class="theme-swatch ${current===t.id?"selected":""}" onclick="previewTheme('${t.id}')" id="swatch_${t.id}">
      <div class="swatch-preview"><div class="swatch-sidebar" style="background:${t.sidebar};"></div><div class="swatch-main" style="background:${t.main};"></div></div>
      <div class="swatch-label">${t.label}</div>
    </div>`).join("")}</div>
    <input type="hidden" id="selectedTheme" value="${current}">
    <div class="row" style="margin-top:18px;"><button class="btn btn-primary" onclick="saveSettingTheme()"><i class="fa-solid fa-save"></i> Simpan & Terapkan Tema</button></div></div>`;
  }else if(tab==="broadcast"){
    c=`<div class="card" style="margin-bottom:14px;border-color:rgba(245,158,11,.3);">
      <h4><i class="fa-solid fa-bullhorn" style="color:#f59e0b;"></i>Broadcast Pesan ke Semua Pengguna</h4>
      <p>Pesan broadcast akan tampil sebagai teks berjalan di bagian atas dashboard semua pengguna yang sedang login.</p>
      <div style="margin-top:16px;">
        <div class="form-group"><label>Pesan Broadcast</label><textarea id="broadcastPesan" class="textarea" placeholder="Tulis pesan broadcast di sini...">${bc.pesan||""}</textarea></div>
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;">
          <span style="font-size:13px;color:#b9c8dc;">Status saat ini:</span>
          <span class="badge ${bc.aktif?"badge-warning":"badge-muted"}">${bc.aktif?"🔴 BROADCAST AKTIF":"⚫ Tidak Aktif"}</span>
          ${bc.aktif?`<span style="font-size:12px;color:#7a9ab8;">Dibuat oleh: ${bc.dibuat_oleh}</span>`:""}
        </div>
        ${bc.aktif&&bc.pesan?`<div class="broadcast-bar" style="border-radius:10px;margin-bottom:14px;"><div class="broadcast-bar-label"><i class="fa-solid fa-eye"></i> Preview</div><div class="broadcast-bar-text"><div class="broadcast-bar-inner">📢 ${bc.pesan} 📢 ${bc.pesan}</div></div></div>`:""}
        <div class="row">
          <button class="btn btn-warning" onclick="sendBroadcast()"><i class="fa-solid fa-bullhorn"></i> Aktifkan Broadcast</button>
          <button class="btn btn-dark" onclick="stopBroadcast()"><i class="fa-solid fa-stop"></i> Nonaktifkan</button>
        </div>
      </div>
    </div>`;
  }else if(tab==="staff"){
    const users=await fetchStaff();
    c=`<div class="card"><h4><i class="fa-solid fa-users-gear"></i>Manajemen Staff</h4><div class="table-wrap" style="margin-top:14px;"><table><thead><tr><th>Nama</th><th>Username</th><th>Jabatan</th><th>Status</th><th>Aksi</th></tr></thead><tbody>${users.map(u=>`<tr><td><b>${u.nama}</b></td><td>${u.username}</td><td>${u.jabatan}</td><td><span class="badge ${u.active?"badge-success":"badge-danger"}">${u.active?"Aktif":"Nonaktif"}</span></td><td><div class="actions"><button class="btn ${u.active?"btn-warning":"btn-success"} btn-xs" onclick="toggleStaffActive(${u.id},${u.active})">${u.active?'<i class="fa-solid fa-ban"></i> Nonaktifkan':'<i class="fa-solid fa-check"></i> Aktifkan'}</button><button class="btn btn-danger btn-xs" onclick="deleteStaff(${u.id},'${u.nama.replace(/'/g,"\\'")}')"><i class="fa-solid fa-trash"></i> Hapus</button></div></td></tr>`).join("")}</tbody></table></div></div>`;
  }
  return tabHtml+c;
}
function setSettingsTab(t){state.currentSettingsTab=t;renderAppPage();}
let pendingTheme="";
function previewTheme(themeId){
  // Hapus selected dari semua swatch
  document.querySelectorAll(".theme-swatch").forEach(el=>el.classList.remove("selected"));
  const sw=document.getElementById("swatch_"+themeId);if(sw)sw.classList.add("selected");
  const input=document.getElementById("selectedTheme");if(input)input.value=themeId;
  // Preview langsung di body
  applyTheme(themeId);pendingTheme=themeId;
}
async function saveSettingTheme(){
  const theme=document.getElementById("selectedTheme")?.value||pendingTheme||"dark-blue";
  try{
    const r=await fetchJson("/api/settings",{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify({theme})});
    if(r.status!=="success"){toast("Gagal simpan tema",true);return;}
    applyTheme(theme);toast("Tema berhasil disimpan & diterapkan ✓");
  }catch{toast("Server error",true);}
}
async function sendBroadcast(){
  const pesan=document.getElementById("broadcastPesan").value.trim();
  if(!pesan){toast("Pesan broadcast wajib diisi",true);return;}
  try{const r=await fetchJson("/api/broadcast",{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify({aktif:true,pesan,dibuat_oleh:state.currentUser.nama})});if(r.status!=="success"){toast(r.message||"Gagal",true);return;}toast("Broadcast diaktifkan! Semua pengguna akan melihat pesan ini.");await renderAppPage();}catch{toast("Server error",true);}
}
async function stopBroadcast(){
  try{const r=await fetchJson("/api/broadcast",{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify({aktif:false,pesan:"",dibuat_oleh:""})});if(r.status!=="success"){toast(r.message||"Gagal",true);return;}toast("Broadcast dinonaktifkan");await renderAppPage();}catch{toast("Server error",true);}
}

      </div>
